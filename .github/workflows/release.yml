name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (SemVer, e.g. 0.1.0)"
        required: true

permissions:
  contents: write

env:
  APP_NAME: Phlow
  PROJECT_PATH: src/Phlow.App/Phlow.App.csproj
  PUBLISH_DIR: publish
  RELEASES_DIR: releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install vpk tool
        run: dotnet tool install -g vpk

      - name: Publish application
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r win-x64
          --self-contained
          -p:Version=${{ inputs.version }}
          -o ${{ env.PUBLISH_DIR }}

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId ${{ env.APP_NAME }}
          --packVersion ${{ inputs.version }}
          --packDir ${{ env.PUBLISH_DIR }}
          --mainExe ${{ env.APP_NAME }}.App.exe
          --outputDir ${{ env.RELEASES_DIR }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ env.APP_NAME }} v${{ inputs.version }}
          generate_release_notes: true
          files: |
            ${{ env.RELEASES_DIR }}/*
